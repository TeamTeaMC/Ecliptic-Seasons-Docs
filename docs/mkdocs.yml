markdown_extensions:
  - toc:
      permalink: true
  - admonition

extra_css:
  - _static/css/custom.css
extra_javascript:
  - _static/js/custom.js

docs_dir: 'source'

extra:
  static_path: [ '[_static]' ]
  alternate:
    - name: English
      link: /en/latest/en/
      lang: en
    - name: 中文
      link: /en/latest/zh/
      lang: zh
plugins:
  - search


